<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Vue</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vuetify@3.7.6/dist/vuetify.min.css">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">

</head>
<body>
    <div id="app">
        <v-app>
        <v-main class="background">
            <v-toolbar color="background">
                <v-toolbar-title>Skin Recs</v-toolbar-title>
                <v-btn v-if="!loggedIn" @click="showSignIn = true" class="bg-primary">
                    Sign In
                    <v-icon>mdi-login</v-icon>
                </v-btn>
                <v-btn v-if="loggedIn" @click="logOut" class="bg-primary">
                    Log out
                    <v-icon>mdi-logout</v-icon>
                </v-btn>
            </v-toolbar>
            <v-card  v-if="showSignIn" v-click-outside="clickOutsideSignIn" class="pa-4 my-4">
                <v-text-field color="primary" label="Email" v-model="emailInput" variant="outlined"></v-text-field>
                <v-text-field color="primary" label="Password" v-model="passwordInput" variant="outlined" type="password"></v-text-field>
                
                <v-btn color="primary" @click="signIn" block class="mt-2">Log In</v-btn>
                <p>Don't have an account? 
                    <v-btn color="primary" @click="showCreateAccount = true; showSignIn = false" class="pa-0" variant="text">Sign up</v-btn>
                </p>
            </v-card>
            <v-card v-if="showCreateAccount" class="pa-4 my-4">
                <v-text-field color="primary" label="Email" v-model="emailInput" variant="outlined" :rules="[rules.required, rules.email]"></v-text-field>
                <v-text-field color="primary" label="Password" v-model="passwordInput" variant="outlined" :rules="[rules.required, rules.password]"></v-text-field>
                <v-text-field color="primary" label="First Name" v-model="firstNameInput" variant="outlined" :rules="[rules.required]"></v-text-field>
                <v-text-field color="primary" label="Last Name" v-model="lastNameInput" variant="outlined" :rules="[rules.required]"></v-text-field>

                <v-btn color="primary" @click="createAccount" block class="mt-2">Create Account</v-btn>
                <p>Already have an account? 
                    <v-btn color="primary" @click="showSignIn = true; showCreateAccount = false" class="pa-0" variant="text">Log in</v-btn>
                </p>
            </v-card>
            <v-card v-if="showAddProduct" class="pa-4 my-4">
                <v-text-field color="primary" label="Name" v-model="nameInput" variant="outlined" :rules="[rules.required]"></v-text-field>
                <v-text-field color="primary" label="Brand" v-model="brandInput" variant="outlined" :rules="[rules.required]"></v-text-field>
                <v-text-field color="primary" label="Bar" v-model="barInput" variant="outlined" :rules="[rules.required]"></v-text-field>
                <v-text-field color="primary" label="Link to Image" v-model="imageLinkInput" variant="outlined" :rules="[rules.required]"></v-text-field>

                <v-btn color="primary" @click="addProduct" block class="mt-2">Add Product</v-btn>
            </v-card>
            <v-card
    class="mx-auto"
    max-width="500"
  >

  <v-container fluid class="fill-height">
    <v-row no-gutters class="justify-space-between">
      <!-- filters on left side -->
      <v-col cols="12" md="2" class="d-flex">
        <v-card class="pa-4 w-100">
          <v-card-title>Side Content</v-card-title>
          <v-card-text>
            put filters here
          </v-card-text>
        </v-card>
      </v-col>
  
      <!-- products on right side-->
      <v-col cols="12" md="8">
        <v-row dense>
          <v-col v-for="product in products" :key="product.name" cols="12" md="3" sm="6" xs="12">
            <v-card class="mx-auto" max-width="200">
              <v-img
                :src="product.imageLink"
                class="align-end"
                gradient="to bottom, rgba(0,0,0,.1), rgba(0,0,0,.5)"
                height="200"
                cover
              >
                <v-card-title class="text-white" v-text="product.name"></v-card-title>
              </v-img>
            </v-card>
          </v-col>
        </v-row>
      </v-col>
    </v-row>
  </v-container>
  </v-card>
            <!-- <v-row>
                <v-col v-for="product in products" cols="12" md="4" >
                    <v-card class="pa-3" color="background" variant="flat">
                        <v-img :width="200" aspect-ratio="1/1" :src="product.imageLink"></v-img>
                        <v-card-title>{{ product.name }}</v-card-title>
                        <v-card-subtitle>{{ product.brand }}</v-card-subtitle>
                    </v-card>
                </v-col>
            </v-row> -->
        </v-main>
        </v-app>
        <!-- end of the vue app -->
    </div>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vuetify@3.7.6/dist/vuetify.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
